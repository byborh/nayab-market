<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142e5d"/>
      <stop offset="50%" stop-color="#0d1f3f"/>
      <stop offset="100%" stop-color="#751515"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffc445" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffc445" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#9b1c1c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#9b1c1c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- decorative borders -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#ffc445" stroke-opacity="0.35" stroke-width="2"/>
  <rect x="56" y="56" width="1088" height="518" fill="none" stroke="#ffc445" stroke-opacity="0.15" stroke-width="1"/>

  <!-- top accent -->
  <text x="600" y="170" font-family="Georgia, serif" font-size="32" fill="#f3ead4" text-anchor="middle" letter-spacing="12">✦ ÉPICERIE AFGHANE ✦</text>

  <!-- main title -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="110" font-weight="900" fill="#ffc445" text-anchor="middle" letter-spacing="6">Nayab Market</text>

  <!-- subtitle -->
  <text x="600" y="395" font-family="Georgia, serif" font-style="italic" font-size="38" fill="#f3ead4" text-anchor="middle">Un voyage au cœur des saveurs afghanes</text>

  <!-- bottom row -->
  <text x="600" y="510" font-family="-apple-system, sans-serif" font-size="22" fill="#d7b974" text-anchor="middle" letter-spacing="3">FRUITS SECS · ÉPICES · THÉS · ÉPICERIE FINE</text>
  <text x="600" y="555" font-family="-apple-system, sans-serif" font-size="20" font-weight="600" fill="#ffc445" text-anchor="middle">4 place de la Chapelle · Paris</text>
</svg>
